name: Auditoría Transacciones

on:
  # Manual trigger (para backfill o ejecución ad-hoc)
  workflow_dispatch:
    inputs:
      desde:
        description: 'Fecha inicio DD-MM-YYYY'
        required: false
        default: '08-03-2026'
      hasta:
        description: 'Fecha fin DD-MM-YYYY (vacío = ayer)'
        required: false
        default: ''
      dry_run:
        description: 'Solo simular (no escribir)'
        type: boolean
        default: false

  # Ejecución automática diaria a las 14:00 ART (17:00 UTC)
  # Tomás suele cargar antes del mediodía
  schedule:
    - cron: '0 17 * * 0-4,6'  # Dom-Jue + Sáb a las 14:00 ART (no corre Viernes = sábados de negocio)

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install gspread google-auth

      - name: Run audit
        id: audit
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.desde }}" ]; then
            ARGS="$ARGS --desde ${{ github.event.inputs.desde }}"
          fi
          if [ -n "${{ github.event.inputs.hasta }}" ]; then
            ARGS="$ARGS --hasta ${{ github.event.inputs.hasta }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python auditoria_transacciones.py $ARGS
        continue-on-error: true

      - name: Check if retry needed
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Audit falló o no encontró datos. Reintentando en 2 horas..."
          echo "RETRY_NEEDED=true" >> $GITHUB_ENV

  # Retry job: corre 2 horas después si el primero falló por falta de datos
  retry:
    needs: auditoria
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Wait 2 hours
        run: sleep 7200

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install gspread google-auth

      - name: Retry audit
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python auditoria_transacciones.py
